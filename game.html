<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>시나모롤 파스텔 테트리스</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Fredoka & Gowun Dodum (둥글둥글 귀여운 폰트) -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', 'Gowun Dodum', sans-serif;
            background-color: #E8F4FD;
            overflow-x: hidden;
            /* 모바일 화면 바운스 스크롤 방지 */
            position: fixed;
            width: 100%;
            height: 100%;
        }
        /* 파스텔 구름 애니메이션 */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 100px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud-1 {
            width: 120px; height: 40px;
            top: 10%; left: -150px;
            animation: floatCloud 25s linear infinite;
        }
        .cloud-1::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud-1::after { width: 70px; height: 70px; top: -35px; right: 15px; }

        .cloud-2 {
            width: 180px; height: 60px;
            top: 40%; left: -200px;
            animation: floatCloud 35s linear infinite;
            animation-delay: 5s;
        }
        .cloud-2::before { width: 80px; height: 80px; top: -30px; left: 25px; }
        .cloud-2::after { width: 100px; height: 100px; top: -50px; right: 25px; }

        .cloud-3 {
            width: 100px; height: 35px;
            top: 75%; left: -120px;
            animation: floatCloud 20s linear infinite;
            animation-delay: 12s;
        }
        .cloud-3::before { width: 40px; height: 40px; top: -15px; left: 12px; }
        .cloud-3::after { width: 55px; height: 55px; top: -25px; right: 12px; }

        @keyframes floatCloud {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(100vw + 250px)); }
        }

        /* 네온/파스텔 푸시 버튼 느낌 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border: 4px solid #BEE3F8;
            box-shadow: 0 8px 32px 0 rgba(165, 213, 244, 0.3);
        }

        /* 터치 딜레이 방지 및 터치 동작 고정 */
        button {
            touch-action: manipulation;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-between p-3 relative select-none">

    <!-- 구름 배경 요소 -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>

    <!-- 헤더 영역 -->
    <header class="w-full max-w-md text-center z-10 py-1 sm:py-2 flex-shrink-0">
        <h1 class="text-2xl sm:text-3xl font-bold text-[#4A90E2] drop-shadow-sm flex items-center justify-center gap-2">
            <!-- 시나모롤 느낌 미니 SVG 아이콘 -->
            <svg class="w-8 h-8 sm:w-10 sm:h-10" viewBox="0 0 100 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="25" y="15" width="50" height="35" rx="17" fill="white" stroke="#BEE3F8" stroke-width="3"/>
                <path d="M28 20 C10 18, 5 35, 25 38 C28 38, 28 32, 28 20 Z" fill="white" stroke="#BEE3F8" stroke-width="3"/>
                <path d="M72 20 C90 18, 95 35, 75 38 C72 38, 72 32, 72 20 Z" fill="white" stroke="#BEE3F8" stroke-width="3"/>
                <circle cx="42" cy="30" r="3" fill="#4A90E2"/>
                <circle cx="58" cy="30" r="3" fill="#4A90E2"/>
                <circle cx="36" cy="35" r="4" fill="#FFB7B2" opacity="0.8"/>
                <circle cx="64" cy="35" r="4" fill="#FFB7B2" opacity="0.8"/>
                <path d="M48 35 Q50 38 52 35" stroke="#4A90E2" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>시나모롤 테트리스</span>
        </h1>
    </header>

    <!-- 게임 메인 컨테이너 (모바일은 세로 배치, 데스크톱은 가로 배치) -->
    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-3 lg:gap-6 z-10 items-center justify-center my-auto flex-grow overflow-hidden">
        
        <!-- 왼쪽 패널: 가이드 및 사운드 조절 (모바일에서는 불필요하므로 숨기고 중간 태블릿 화면 이상부터 보여줌) -->
        <section class="lg:col-span-4 hidden md:flex flex-col justify-between gap-3 w-full max-w-md mx-auto">
            <!-- 마스코트 반응형 박스 -->
            <div class="glass-panel rounded-3xl p-3 flex flex-col items-center justify-center text-center">
                <!-- 시나모롤 마스코트 SVG -->
                <div class="relative w-32 h-24 my-1 transition-transform duration-300 hover:scale-105" id="mascot-container">
                    <svg viewBox="0 0 120 80" class="w-full h-full">
                        <ellipse cx="60" cy="45" rx="30" ry="22" fill="white" stroke="#90CDF4" stroke-width="3"/>
                        <path id="ear-l" d="M32 35 C-10 30, -5 65, 30 52" fill="white" stroke="#90CDF4" stroke-width="3" stroke-linejoin="round"/>
                        <path id="ear-r" d="M88 35 C130 30, 125 65, 90 52" fill="white" stroke="#90CDF4" stroke-width="3" stroke-linejoin="round"/>
                        <circle cx="48" cy="45" r="3.5" fill="#3182CE"/>
                        <circle cx="72" cy="45" r="3.5" fill="#3182CE"/>
                        <circle cx="41" cy="51" r="5" fill="#FFB7B2"/>
                        <circle cx="79" cy="51" r="5" fill="#FFB7B2"/>
                        <path id="mascot-mouth" d="M57 51 Q60 54 63 51" stroke="#3182CE" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                        <circle cx="48" cy="68" r="5" fill="white" stroke="#90CDF4" stroke-width="2"/>
                        <circle cx="72" cy="68" r="5" fill="white" stroke="#90CDF4" stroke-width="2"/>
                    </svg>
                    <!-- 말풍선 -->
                    <div id="mascot-bubble" class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-white border-2 border-[#90CDF4] text-[10px] px-2 py-0.5 rounded-full text-[#3182CE] font-bold shadow-sm whitespace-nowrap">
                        안녕! 준비됐어?
                    </div>
                </div>
                <div class="text-[11px] text-[#718096] font-medium leading-relaxed mt-1 text-center">
                    <span class="text-[#3182CE] font-bold">시나몬</span>은 플레이 상황에 따라 표정이 바뀌어요! 
                </div>
            </div>

            <!-- 사운드 컨트롤 & 조작 가이드 -->
            <div class="glass-panel rounded-3xl p-3 flex flex-col gap-2">
                <h3 class="text-sm font-bold text-[#4A90E2] border-b border-[#E2E8F0] pb-1">음향 설정</h3>
                <div class="flex items-center justify-between gap-2 text-xs">
                    <span class="text-[#4A5568] font-semibold">배경음악 (BGM)</span>
                    <button id="btn-bgm" class="px-2.5 py-1 rounded-full font-bold bg-[#E2E8F0] text-[#4A5568] hover:bg-[#BEE3F8] transition-colors focus:outline-none">
                        끄기 🔇
                    </button>
                </div>
                <div class="flex items-center justify-between gap-2 text-xs">
                    <span class="text-[#4A5568] font-semibold">효과음 (SFX)</span>
                    <button id="btn-sfx" class="px-2.5 py-1 rounded-full font-bold bg-[#90CDF4] text-white hover:opacity-90 transition-opacity focus:outline-none">
                        켜짐 🔊
                    </button>
                </div>
                
                <h3 class="text-sm font-bold text-[#4A90E2] border-b border-[#E2E8F0] pb-1 mt-1">키보드 조작법</h3>
                <ul class="text-[11px] text-[#718096] space-y-1">
                    <li class="flex justify-between"><span>이동</span> <span class="font-bold text-[#4A5568]">← / → 방향키</span></li>
                    <li class="flex justify-between"><span>블록 회전</span> <span class="font-bold text-[#4A5568]">↑ 방향키</span></li>
                    <li class="flex justify-between"><span>소프트 드롭</span> <span class="font-bold text-[#4A5568]">↓ 방향키</span></li>
                    <li class="flex justify-between"><span>하드 드롭</span> <span class="font-bold text-[#4A5568]">Space bar</span></li>
                    <li class="flex justify-between"><span>보관 (Hold)</span> <span class="font-bold text-[#4A5568]">Shift / C 키</span></li>
                </ul>
            </div>
        </section>

        <!-- 우측/가운데 메인 게임 패널 (모바일 맞춤 레이아웃) -->
        <section class="lg:col-span-8 w-full max-w-md mx-auto flex flex-col items-center justify-center">
            <div class="glass-panel p-2.5 xs:p-3 rounded-[2rem] relative shadow-lg w-full flex flex-col items-center">
                
                <!-- 상단 미니 대시보드 (스코어, 레벨, 라인 가로 정렬) -->
                <div class="w-full grid grid-cols-3 gap-1 text-center bg-white/80 py-1.5 px-2 rounded-2xl border-2 border-[#BEE3F8] mb-2 sm:mb-3">
                    <div>
                        <span class="text-[10px] sm:text-xs font-bold text-[#A0AEC0] block">SCORE</span>
                        <span id="txt-score" class="text-sm sm:text-lg font-black text-[#4A90E2] tracking-wide">000000</span>
                    </div>
                    <div class="border-x-2 border-[#E2E8F0]">
                        <span class="text-[10px] sm:text-xs font-bold text-[#A0AEC0] block">LEVEL</span>
                        <div class="flex items-center justify-center gap-0.5">
                            <span id="txt-level" class="text-sm sm:text-lg font-black text-[#F6AD55]">1</span>
                            <span class="text-[9px] text-[#A0AEC0] font-bold">/100</span>
                        </div>
                    </div>
                    <div>
                        <span class="text-[10px] sm:text-xs font-bold text-[#A0AEC0] block">LINES</span>
                        <span id="txt-lines" class="text-sm sm:text-lg font-black text-[#4FD1C5]">0</span>
                    </div>
                </div>

                <!-- 게임 영역 (HOLD 패널 + 메인 캔버스 + NEXT 패널 가로 배치) -->
                <div class="flex flex-row items-center justify-center gap-1.5 sm:gap-3 w-full relative">
                    
                    <!-- 모바일 HOLD 패널 -->
                    <div class="flex flex-col items-center bg-white/70 rounded-2xl border-2 border-[#E2E8F0] p-1.5 w-14 xs:w-16 sm:w-20 shadow-sm flex-shrink-0">
                        <span class="text-[9px] sm:text-xs font-extrabold text-[#90CDF4] mb-1">HOLD</span>
                        <div class="w-10 h-10 xs:w-12 xs:h-12 sm:w-16 sm:h-16 bg-white/80 rounded-xl border border-[#E2E8F0] flex items-center justify-center">
                            <canvas id="hold-canvas" width="80" height="80" class="w-full h-full"></canvas>
                        </div>
                    </div>

                    <!-- 중앙 반응형 메인 게임 캔버스 컨테이너 (높이 고정 해제, 비율 유지) -->
                    <div class="relative flex-grow max-w-[170px] xs:max-w-[190px] sm:max-w-[240px] aspect-[1/2] rounded-[1.5rem] overflow-hidden border-4 border-[#E2E8F0] shadow-inner bg-white">
                        <canvas id="tetris-canvas" class="block w-full h-full" width="300" height="600"></canvas>
                    </div>

                    <!-- 모바일 NEXT 패널 -->
                    <div class="flex flex-col items-center bg-white/70 rounded-2xl border-2 border-[#E2E8F0] p-1.5 w-14 xs:w-16 sm:w-20 shadow-sm flex-shrink-0">
                        <span class="text-[9px] sm:text-xs font-extrabold text-[#90CDF4] mb-1">NEXT</span>
                        <div class="w-10 h-10 xs:w-12 xs:h-12 sm:w-16 sm:h-16 bg-white/80 rounded-xl border border-[#E2E8F0] flex items-center justify-center">
                            <canvas id="next-canvas" width="80" height="80" class="w-full h-full"></canvas>
                        </div>
                    </div>

                </div>

                <!-- 일시정지, 게임시작 화면 오버레이 (중앙에 위치) -->
                <div id="game-overlay" class="absolute inset-2.5 bg-white/95 backdrop-blur-sm rounded-[1.5rem] flex flex-col items-center justify-center p-4 text-center z-20">
                    <div class="w-16 h-16 sm:w-20 sm:h-20 mb-2">
                        <svg viewBox="0 0 100 80" class="w-full h-full">
                            <ellipse cx="50" cy="45" rx="25" ry="18" fill="white" stroke="#90CDF4" stroke-width="2.5"/>
                            <path d="M26 38 C0 33, 5 60, 26 48" fill="white" stroke="#90CDF4" stroke-width="2.5"/>
                            <path d="M74 38 C100 33, 95 60, 74 48" fill="white" stroke="#90CDF4" stroke-width="2.5"/>
                            <circle cx="40" cy="45" r="3" fill="#3182CE"/>
                            <circle cx="60" cy="45" r="3" fill="#3182CE"/>
                            <circle cx="34" cy="50" r="4" fill="#FFB7B2"/>
                            <circle cx="66" cy="50" r="4" fill="#FFB7B2"/>
                            <path d="M47 49 Q50 51 53 49" stroke="#3182CE" stroke-width="2" stroke-linecap="round" fill="none"/>
                        </svg>
                    </div>
                    <h2 id="overlay-title" class="text-xl sm:text-2xl font-bold text-[#4A90E2] mb-1">시나모롤 테트리스</h2>
                    <p id="overlay-desc" class="text-[11px] sm:text-xs text-[#718096] mb-4 leading-relaxed">하늘 위 구름나라에서 귀여운 블록을 쌓아보세요!</p>

                    <!-- 시작 레벨 설정 컨트롤러 추가 -->
                    <div class="flex flex-col items-center gap-1 mb-4 bg-[#E8F4FD] px-3.5 py-2 rounded-2xl border-2 border-[#BEE3F8]">
                        <span class="text-[10px] font-extrabold text-[#4A90E2] select-none">시작 레벨 설정</span>
                        <div class="flex items-center gap-3">
                            <button id="btn-lvl-minus" class="w-7 h-7 rounded-full bg-[#90CDF4] text-white font-extrabold text-xs flex items-center justify-center hover:bg-[#63B3ED] active:scale-90 transition-transform focus:outline-none select-none">
                                ◀
                            </button>
                            <span id="txt-lvl-select" class="text-base font-black text-orange-400 min-w-[32px] text-center select-none">1</span>
                            <button id="btn-lvl-plus" class="w-7 h-7 rounded-full bg-[#90CDF4] text-white font-extrabold text-xs flex items-center justify-center hover:bg-[#63B3ED] active:scale-90 transition-transform focus:outline-none select-none">
                                ▶
                            </button>
                        </div>
                    </div>

                    <button id="btn-start" class="px-6 py-2 bg-[#90CDF4] text-white font-bold rounded-full text-sm sm:text-md shadow-md hover:bg-[#63B3ED] active:scale-95 transition-all focus:outline-none">
                        게임 시작하기 🎮
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- 모바일 전용 가상 컨트롤러 영역 -->
    <footer class="w-full max-w-sm z-10 py-1 sm:py-2 flex-shrink-0">
        <div class="grid grid-cols-5 gap-1.5 p-1.5 bg-white/60 backdrop-blur-sm rounded-2xl border-2 border-[#BEE3F8] shadow-sm">
            <!-- 보관 (Hold) 버튼 -->
            <button id="ctrl-hold" class="aspect-square bg-slate-100 hover:bg-[#E2E8F0] text-[#718096] active:scale-90 transition-transform font-bold rounded-xl flex flex-col items-center justify-center text-[10px] shadow-inner focus:outline-none">
                <span>Hold</span>
                <span class="text-[8px] text-sky-400 font-extrabold">C</span>
            </button>
            <!-- 왼쪽 이동 -->
            <button id="ctrl-left" class="aspect-square bg-[#90CDF4]/20 hover:bg-[#90CDF4]/40 text-[#3182CE] active:scale-90 transition-transform font-bold rounded-xl flex items-center justify-center text-lg shadow-inner focus:outline-none">
                ◀
            </button>
            <!-- 회전 (위로) -->
            <button id="ctrl-up" class="aspect-square bg-[#FFB7B2]/20 hover:bg-[#FFB7B2]/40 text-[#E53E3E] active:scale-90 transition-transform font-bold rounded-xl flex flex-col items-center justify-center text-[10px] shadow-inner focus:outline-none">
                <span class="text-md leading-none">▲</span>
                <span class="text-[8px] font-extrabold text-red-400">회전</span>
            </button>
            <!-- 오른쪽 이동 -->
            <button id="ctrl-right" class="aspect-square bg-[#90CDF4]/20 hover:bg-[#90CDF4]/40 text-[#3182CE] active:scale-90 transition-transform font-bold rounded-xl flex items-center justify-center text-lg shadow-inner focus:outline-none">
                ▶
            </button>
            <!-- 하드 드롭 (Space) -->
            <button id="ctrl-space" class="aspect-square bg-[#4FD1C5]/20 hover:bg-[#4FD1C5]/40 text-[#319795] active:scale-90 transition-transform font-bold rounded-xl flex flex-col items-center justify-center text-[9px] shadow-inner focus:outline-none">
                <span>Drop</span>
                <span class="text-[9px] text-teal-500 font-extrabold">▼▼</span>
            </button>
        </div>
        <!-- 소프트 드롭은 중앙 하단에 미니 터치패드 레이아웃 최적화 -->
        <div class="flex justify-center mt-1.5">
            <button id="ctrl-down" class="w-full py-2 bg-[#90CDF4]/20 hover:bg-[#90CDF4]/40 text-[#3182CE] active:scale-95 transition-transform font-bold rounded-xl text-[10px] flex items-center justify-center gap-1 shadow-inner focus:outline-none">
                ▼ 천천히 내리기 (소프트 드롭)
            </button>
        </div>
    </footer>

    <!-- 게임 시스템 및 로직 자바스크립트 -->
    <script>
        // ----------------- Web Audio API 사운드 생성기 -----------------
        class SoundSynth {
            constructor() {
                this.ctx = null;
                this.isSfxEnabled = true;
                this.isBgmEnabled = false;
                this.bgmInterval = null;
                this.bgmStep = 0;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            playTone(freq, type, duration, volume = 0.1) {
                if (!this.isSfxEnabled || !this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();

                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    
                    gainNode.gain.setValueAtTime(volume, this.ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);

                    osc.connect(gainNode);
                    gainNode.connect(this.ctx.destination);

                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                } catch (e) {
                    console.log("오디오 재생 에러:", e);
                }
            }

            playMove() {
                this.init();
                this.playTone(600, 'triangle', 0.08, 0.15);
            }

            playRotate() {
                this.init();
                this.playTone(880, 'sine', 0.12, 0.2);
            }

            playDrop() {
                this.init();
                this.playTone(150, 'triangle', 0.15, 0.3);
            }

            playClear() {
                this.init();
                const now = this.ctx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, index) => {
                    setTimeout(() => {
                        this.playTone(freq, 'sine', 0.25, 0.15);
                    }, index * 80);
                });
            }

            playLevelUp() {
                this.init();
                const notes = [587.33, 698.46, 880.00, 1174.66];
                notes.forEach((freq, index) => {
                    setTimeout(() => {
                        this.playTone(freq, 'triangle', 0.3, 0.2);
                    }, index * 100);
                });
            }

            playGameOver() {
                this.init();
                const notes = [392.00, 349.23, 311.13, 261.63];
                notes.forEach((freq, index) => {
                    setTimeout(() => {
                        this.playTone(freq, 'sawtooth', 0.4, 0.15);
                    }, index * 150);
                });
            }

            startBgm() {
                this.init();
                if (this.bgmInterval) clearInterval(this.bgmInterval);
                if (!this.isBgmEnabled) return;

                const melody = [
                    523.25, 587.33, 659.25, 783.99, 880.00, 783.99, 659.25, 587.33,
                    659.25, 659.25, 783.99, 880.00, 1046.50, 880.00, 783.99, 659.25
                ];

                this.bgmStep = 0;
                this.bgmInterval = setInterval(() => {
                    if (!this.isBgmEnabled) return;
                    const freq = melody[this.bgmStep % melody.length];
                    this.playTone(freq, 'sine', 0.25, 0.04);
                    this.bgmStep++;
                }, 300);
            }

            stopBgm() {
                if (this.bgmInterval) {
                    clearInterval(this.bgmInterval);
                    this.bgmInterval = null;
                }
            }
        }

        const sound = new SoundSynth();

        // ----------------- 테트리스 주요 상수 및 설정 -----------------
        const CANVAS_WIDTH = 300;
        const CANVAS_HEIGHT = 600;
        const ROWS = 20;
        const COLS = 10;
        const BLOCK_SIZE = CANVAS_WIDTH / COLS; // 30px

        // 블록별 색상 매핑
        const COLORS = {
            1: { bg: '#EBF8FF', border: '#BEE3F8', isCinnamon: true,  name: 'CinnBody' },
            2: { bg: '#E2E8F0', border: '#CBD5E0', isCinnamon: false, name: 'Cloud' },
            3: { bg: '#FFD8D6', border: '#FFB7B2', isCinnamon: false, name: 'CheekPink' },
            4: { bg: '#D3F9D8', border: '#A3E635', isCinnamon: false, name: 'MintSky' },
            5: { bg: '#EBF4FF', border: '#90CDF4', isCinnamon: false, name: 'CyanSky' },
            6: { bg: '#FEFCBF', border: '#F6E05E', isCinnamon: false, name: 'Chiffon' },
            7: { bg: '#E2D9F3', border: '#D6BCFA', isCinnamon: false, name: 'Mocha' }
        };

        const SHAPES = {
            'O': [[1, 1],
                  [1, 1]],

            'I': [[0, 2, 0, 0],
                  [0, 2, 0, 0],
                  [0, 2, 0, 0],
                  [0, 2, 0, 0]],

            'T': [[0, 3, 0],
                  [3, 3, 3],
                  [0, 0, 0]],

            'S': [[0, 4, 4],
                  [4, 4, 0],
                  [0, 0, 0]],

            'Z': [[5, 5, 0],
                  [0, 5, 5],
                  [0, 0, 0]],

            'J': [[0, 6, 0],
                  [0, 6, 0],
                  [6, 6, 0]],

            'L': [[0, 7, 0],
                  [0, 7, 0],
                  [0, 7, 7]]
        };

        // ----------------- 테트리스 코어 엔진 클래스 -----------------
        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('tetris-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('next-canvas');
                this.nextCtx = this.nextCanvas.getContext('2d');
                this.holdCanvas = document.getElementById('hold-canvas');
                this.holdCtx = this.holdCanvas.getContext('2d');

                this.grid = this.createGrid();
                this.score = 0;
                this.level = 1;
                this.startLevel = 1; // 사용자가 고른 시작 레벨 저장 공간 추가
                this.lines = 0;
                this.isGameOver = false;
                this.isPaused = true;

                this.currentPiece = null;
                this.nextPiece = null;
                this.holdPiece = null;
                this.hasHeld = false;

                this.dropCounter = 0;
                this.lastTime = 0;

                this.mascotState = 'idle'; 
                this.mascotTimer = null;
            }

            createGrid() {
                return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
            }

            getRandomPiece() {
                const pieces = ['O', 'I', 'T', 'S', 'Z', 'J', 'L'];
                const randType = pieces[Math.floor(Math.random() * pieces.length)];
                const shape = SHAPES[randType];
                
                return {
                    type: randType,
                    matrix: JSON.parse(JSON.stringify(shape)),
                    x: Math.floor((COLS - shape[0].length) / 2),
                    y: randType === 'I' ? -2 : -1
                };
            }

            start() {
                this.grid = this.createGrid();
                this.score = 0;
                this.level = this.startLevel; // 선택했던 레벨로 대입
                this.lines = 0;
                this.isGameOver = false;
                this.isPaused = false;
                this.holdPiece = null;
                this.hasHeld = false;

                this.currentPiece = this.getRandomPiece();
                this.nextPiece = this.getRandomPiece();

                this.updateScoreUI();
                this.hideOverlay();
                this.updateMascot('happy', '우와! 힘내자구!');
                
                sound.startBgm();

                this.lastTime = performance.now();
                requestAnimationFrame((t) => this.update(t));
            }

            update(time = 0) {
                if (this.isPaused || this.isGameOver) return;

                const deltaTime = time - this.lastTime;
                this.lastTime = time;
                this.dropCounter += deltaTime;

                // 속도 조절 (레벨 최대 100에 맞추어 최소 60ms까지 하강 속도 조정)
                const speed = Math.max(60, 800 - (this.level - 1) * 7.5);

                if (this.dropCounter > speed) {
                    this.drop();
                }

                this.draw();
                requestAnimationFrame((t) => this.update(t));
            }

            drop() {
                this.currentPiece.y++;
                if (this.collide()) {
                    this.currentPiece.y--;
                    this.merge();
                    this.clearLines();
                    this.spawnNext();
                }
                this.dropCounter = 0;
            }

            hardDrop() {
                if (this.isPaused || this.isGameOver) return;
                let steps = 0;
                while (!this.collide()) {
                    this.currentPiece.y++;
                    steps++;
                }
                this.currentPiece.y--;
                this.merge();
                this.clearLines();
                this.spawnNext();
                sound.playDrop();
                
                if (steps > 12) {
                    this.updateMascot('happy', '완벽한 낙하야! ✨', 1500);
                }
            }

            move(dir) {
                this.currentPiece.x += dir;
                if (this.collide()) {
                    this.currentPiece.x -= dir;
                } else {
                    sound.playMove();
                }
            }

            rotate() {
                const matrix = this.currentPiece.matrix;
                const n = matrix.length;
                const temp = Array.from({ length: n }, () => Array(n).fill(0));
                for (let r = 0; r < n; r++) {
                    for (let c = 0; c < n; c++) {
                        temp[c][n - 1 - r] = matrix[r][c];
                    }
                }

                const originalX = this.currentPiece.x;
                const originalMatrix = this.currentPiece.matrix;
                this.currentPiece.matrix = temp;

                let offset = 1;
                while (this.collide()) {
                    this.currentPiece.x += offset;
                    offset = -(offset + (offset > 0 ? 1 : -1));
                    if (Math.abs(offset) > matrix[0].length) {
                        this.currentPiece.matrix = originalMatrix;
                        this.currentPiece.x = originalX;
                        return;
                    }
                }
                sound.playRotate();
            }

            hold() {
                if (this.hasHeld || this.isPaused || this.isGameOver) return;

                sound.playRotate();
                
                if (!this.holdPiece) {
                    this.holdPiece = {
                        type: this.currentPiece.type,
                        matrix: SHAPES[this.currentPiece.type]
                    };
                    this.currentPiece = this.nextPiece;
                    this.nextPiece = this.getRandomPiece();
                } else {
                    const temp = {
                        type: this.holdPiece.type,
                        matrix: SHAPES[this.holdPiece.type]
                    };
                    this.holdPiece = {
                        type: this.currentPiece.type,
                        matrix: SHAPES[this.currentPiece.type]
                    };
                    this.currentPiece = {
                        type: temp.type,
                        matrix: temp.matrix,
                        x: Math.floor((COLS - temp.matrix[0].length) / 2),
                        y: temp.type === 'I' ? -2 : -1
                    };
                }
                
                this.hasHeld = true;
                this.drawPreviewPanels();
            }

            collide() {
                const matrix = this.currentPiece.matrix;
                for (let r = 0; r < matrix.length; r++) {
                    for (let c = 0; c < matrix[r].length; c++) {
                        if (matrix[r][c] !== 0) {
                            const boardX = this.currentPiece.x + c;
                            const boardY = this.currentPiece.y + r;

                            if (boardX < 0 || boardX >= COLS || boardY >= ROWS) {
                                return true;
                            }
                            if (boardY >= 0 && this.grid[boardY][boardX] !== 0) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            merge() {
                const matrix = this.currentPiece.matrix;
                for (let r = 0; r < matrix.length; r++) {
                    for (let c = 0; c < matrix[r].length; c++) {
                        if (matrix[r][c] !== 0) {
                            const boardY = this.currentPiece.y + r;
                            const boardX = this.currentPiece.x + c;
                            
                            if (boardY < 0) {
                                this.triggerGameOver();
                                return;
                            }
                            this.grid[boardY][boardX] = matrix[r][c];
                        }
                    }
                }
            }

            clearLines() {
                let cleared = 0;
                
                outer: for (let r = ROWS - 1; r >= 0; r--) {
                    for (let c = 0; c < COLS; c++) {
                        if (this.grid[r][c] === 0) {
                            continue outer;
                        }
                    }
                    
                    this.grid.splice(r, 1);
                    this.grid.unshift(Array(COLS).fill(0));
                    cleared++;
                    r++;
                }

                if (cleared > 0) {
                    sound.playClear();

                    const basePoints = [0, 100, 300, 500, 800];
                    const gainedPoints = basePoints[cleared] * this.level;
                    this.score += gainedPoints;
                    this.lines += cleared;

                    // 사용자가 지정한 시작 레벨을 기준으로 10줄 단위 레벨업 시스템 빌드
                    const targetLevel = Math.min(100, this.startLevel + Math.floor(this.lines / 10));
                    if (targetLevel > this.level) {
                        this.level = targetLevel;
                        sound.playLevelUp();
                        this.updateMascot('happy', `레벨 업! 벌써 ${this.level}단계야!`, 2500);
                    } else {
                        if (cleared >= 3) {
                            this.updateMascot('happy', '대단해! 구름처럼 쌓았어!', 2000);
                        } else {
                            this.updateMascot('happy', '아싸! 시나몬 기분 최고!', 1000);
                        }
                    }

                    this.updateScoreUI();
                } else {
                    const highestRow = this.getHighestBlockRow();
                    if (highestRow < 7) {
                        this.updateMascot('sad', '으앗! 조심해, 무너지겠어!', 1500);
                    }
                }
            }

            getHighestBlockRow() {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (this.grid[r][c] !== 0) return r;
                    }
                }
                return ROWS;
            }

            spawnNext() {
                this.currentPiece = this.nextPiece;
                this.nextPiece = this.getRandomPiece();
                this.hasHeld = false;

                if (this.collide()) {
                    this.triggerGameOver();
                }

                this.drawPreviewPanels();
            }

            triggerGameOver() {
                this.isGameOver = true;
                sound.stopBgm();
                sound.playGameOver();
                this.updateMascot('sad', '아쉽다... 다시 해보자! 🥺');
                
                document.getElementById('overlay-title').innerText = 'GAME OVER';
                document.getElementById('overlay-title').style.color = '#FC8181';
                document.getElementById('overlay-desc').innerHTML = `최종 점수: <b class="text-[#4A90E2] text-sm sm:text-lg">${this.score}점</b><br>도달한 레벨: <b class="text-orange-400 text-sm sm:text-lg">Level ${this.level}</b>`;
                document.getElementById('btn-start').innerText = '다시 도전하기 🍭';
                
                this.showOverlay();
            }

            updateScoreUI() {
                document.getElementById('txt-score').innerText = String(this.score).padStart(6, '0');
                document.getElementById('txt-level').innerText = this.level;
                document.getElementById('txt-lines').innerText = this.lines;
            }

            updateMascot(state, message, resetDelay = 0) {
                const earL = document.getElementById('ear-l');
                const earR = document.getElementById('ear-r');
                const mouth = document.getElementById('mascot-mouth');
                const bubble = document.getElementById('mascot-bubble');

                // 마스코트 엘리먼트가 보이지 않는 화면 환경(모바일 등)에서의 에러 방지 처리
                if (!earL || !earR || !mouth || !bubble) return;

                if (this.mascotTimer) clearTimeout(this.mascotTimer);

                if (state === 'happy') {
                    earL.setAttribute('d', 'M32 30 C-10 20, -5 55, 30 42');
                    earR.setAttribute('d', 'M88 30 C130 20, 125 55, 90 42');
                    mouth.setAttribute('d', 'M55 48 Q60 55 65 48');
                } else if (state === 'sad') {
                    earL.setAttribute('d', 'M32 40 C-15 45, -5 75, 30 58');
                    earR.setAttribute('d', 'M88 40 C135 45, 125 75, 90 58');
                    mouth.setAttribute('d', 'M56 52 Q60 48 64 52');
                } else {
                    earL.setAttribute('d', 'M32 35 C-10 30, -5 65, 30 52');
                    earR.setAttribute('d', 'M88 35 C130 30, 125 65, 90 52');
                    mouth.setAttribute('d', 'M57 51 Q60 54 63 51');
                }

                bubble.innerText = message;

                if (resetDelay > 0) {
                    this.mascotTimer = setTimeout(() => {
                        this.updateMascot('idle', '구름처럼 몽실몽실~☁️');
                    }, resetDelay);
                }
            }

            draw() {
                this.ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                // 파스텔 바둑판 격자 가이드선 그리기
                this.ctx.strokeStyle = '#F3F4F6';
                this.ctx.lineWidth = 1;
                for (let r = 0; r <= ROWS; r++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, r * BLOCK_SIZE);
                    this.ctx.lineTo(CANVAS_WIDTH, r * BLOCK_SIZE);
                    this.ctx.stroke();
                }
                for (let c = 0; c <= COLS; c++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(c * BLOCK_SIZE, 0);
                    this.ctx.lineTo(c * BLOCK_SIZE, CANVAS_HEIGHT);
                    this.ctx.stroke();
                }

                // 1. 적층된 블록들 렌더링
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (this.grid[r][c] !== 0) {
                            this.drawBlock(this.ctx, c, r, this.grid[r][c]);
                        }
                    }
                }

                // 2. 조작 플레이어 블록 렌더링
                if (this.currentPiece) {
                    const matrix = this.currentPiece.matrix;
                    for (let r = 0; r < matrix.length; r++) {
                        for (let c = 0; c < matrix[r].length; c++) {
                            if (matrix[r][c] !== 0) {
                                this.drawBlock(this.ctx, this.currentPiece.x + c, this.currentPiece.y + r, matrix[r][c]);
                            }
                        }
                    }
                }
            }

            drawBlock(context, x, y, value, isPreview = false) {
                if (y < 0 && !isPreview) return;

                const colorConfig = COLORS[value];
                if (!colorConfig) return;

                const size = isPreview ? 20 : BLOCK_SIZE;
                const px = x * size;
                const py = y * size;

                context.save();

                context.fillStyle = colorConfig.bg;
                context.strokeStyle = colorConfig.border;
                context.lineWidth = isPreview ? 1.5 : 2.5;

                context.beginPath();
                const radius = isPreview ? 4 : 7;
                context.roundRect ? context.roundRect(px + 1, py + 1, size - 2, size - 2, radius) : context.rect(px, py, size, size);
                context.fill();
                context.stroke();

                // 블록 마다 디테일하게 삽입되는 시나모롤 마스코트 얼굴 구현
                const faceCenterX = px + size / 2;
                const faceCenterY = py + size / 2;

                // 귀여운 파란 눈망울
                context.fillStyle = '#4A90E2';
                context.beginPath();
                context.arc(faceCenterX - (size * 0.22), faceCenterY - (size * 0.05), isPreview ? 1.2 : 2.2, 0, Math.PI * 2);
                context.arc(faceCenterX + (size * 0.22), faceCenterY - (size * 0.05), isPreview ? 1.2 : 2.2, 0, Math.PI * 2);
                context.fill();

                // 발그레 복숭아빛 볼터치
                context.fillStyle = '#FFB7B2';
                context.beginPath();
                context.arc(faceCenterX - (size * 0.32), faceCenterY + (size * 0.15), isPreview ? 1.5 : 2.8, 0, Math.PI * 2);
                context.arc(faceCenterX + (size * 0.32), faceCenterY + (size * 0.15), isPreview ? 1.5 : 2.8, 0, Math.PI * 2);
                context.fill();

                // 작은 미소 입꼬리
                context.strokeStyle = '#4A90E2';
                context.lineWidth = isPreview ? 0.8 : 1.2;
                context.lineCap = 'round';
                context.beginPath();
                context.arc(faceCenterX, faceCenterY + (size * 0.08), isPreview ? 1.2 : 2.2, 0, Math.PI);
                context.stroke();

                context.restore();
            }

            drawPreviewPanels() {
                // 1. NEXT (다음) 영역 그리기
                this.nextCtx.clearRect(0, 0, 80, 80);
                if (this.nextPiece) {
                    const matrix = this.nextPiece.matrix;
                    const offsetX = (80 - matrix[0].length * 20) / 2 / 20;
                    const offsetY = (80 - matrix.length * 20) / 2 / 20;

                    for (let r = 0; r < matrix.length; r++) {
                        for (let c = 0; c < matrix[r].length; c++) {
                            if (matrix[r][c] !== 0) {
                                this.drawBlock(this.nextCtx, c + offsetX, r + offsetY, matrix[r][c], true);
                            }
                        }
                    }
                }

                // 2. HOLD (보관) 영역 그리기
                this.holdCtx.clearRect(0, 0, 80, 80);
                if (this.holdPiece) {
                    const matrix = this.holdPiece.matrix;
                    const offsetX = (80 - matrix[0].length * 20) / 2 / 20;
                    const offsetY = (80 - matrix.length * 20) / 2 / 20;

                    for (let r = 0; r < matrix.length; r++) {
                        for (let c = 0; c < matrix[r].length; c++) {
                            if (matrix[r][c] !== 0) {
                                this.drawBlock(this.holdCtx, c + offsetX, r + offsetY, matrix[r][c], true);
                            }
                        }
                    }
                }
            }

            showOverlay() {
                document.getElementById('game-overlay').style.display = 'flex';
                this.isPaused = true;
            }

            hideOverlay() {
                document.getElementById('game-overlay').style.display = 'none';
                this.isPaused = false;
            }
        }

        // ----------------- 이벤트 리스너 및 초기화 -----------------
        const game = new TetrisGame();

        // 레벨 조절 가상 버튼들 바인딩
        const btnLvlMinus = document.getElementById('btn-lvl-minus');
        const btnLvlPlus = document.getElementById('btn-lvl-plus');
        const txtLvlSelect = document.getElementById('txt-lvl-select');

        btnLvlMinus.addEventListener('click', (e) => {
            e.preventDefault();
            if (game.startLevel > 1) {
                game.startLevel--;
                txtLvlSelect.innerText = game.startLevel;
                sound.playMove(); // 조작 피드백 사운드
            }
        });

        btnLvlPlus.addEventListener('click', (e) => {
            e.preventDefault();
            if (game.startLevel < 100) {
                game.startLevel++;
                txtLvlSelect.innerText = game.startLevel;
                sound.playMove(); // 조작 피드백 사운드
            }
        });

        // 게임 시작 버튼
        document.getElementById('btn-start').addEventListener('click', () => {
            game.start();
        });

        // 물리 키보드 입력 매핑
        window.addEventListener('keydown', (e) => {
            if (game.isPaused || game.isGameOver) return;

            switch (e.key) {
                case 'ArrowLeft':
                    game.move(-1);
                    break;
                case 'ArrowRight':
                    game.move(1);
                    break;
                case 'ArrowDown':
                    game.drop();
                    sound.playMove();
                    break;
                case 'ArrowUp':
                    game.rotate();
                    break;
                case ' ':
                    e.preventDefault();
                    game.hardDrop();
                    break;
                case 'Shift':
                case 'c':
                case 'C':
                    game.hold();
                    break;
            }
            game.draw();
        });

        // 가상 버튼 바인딩 (모바일 터치 최적화)
        document.getElementById('ctrl-left').addEventListener('click', (e) => {
            e.preventDefault();
            if (game.isPaused || game.isGameOver) return;
            game.move(-1);
            game.draw();
        });

        document.getElementById('ctrl-right').addEventListener('click', (e) => {
            e.preventDefault();
            if (game.isPaused || game.isGameOver) return;
            game.move(1);
            game.draw();
        });

        document.getElementById('ctrl-up').addEventListener('click', (e) => {
            e.preventDefault();
            if (game.isPaused || game.isGameOver) return;
            game.rotate();
            game.draw();
        });

        document.getElementById('ctrl-down').addEventListener('click', (e) => {
            e.preventDefault();
            if (game.isPaused || game.isGameOver) return;
            game.drop();
            sound.playMove();
            game.draw();
        });

        document.getElementById('ctrl-space').addEventListener('click', (e) => {
            e.preventDefault();
            if (game.isPaused || game.isGameOver) return;
            game.hardDrop();
            game.draw();
        });

        document.getElementById('ctrl-hold').addEventListener('click', (e) => {
            e.preventDefault();
            if (game.isPaused || game.isGameOver) return;
            game.hold();
            game.draw();
        });

        // 사운드 스위치 이벤트 리스너
        const btnBgm = document.getElementById('btn-bgm');
        const btnSfx = document.getElementById('btn-sfx');

        btnBgm.addEventListener('click', () => {
            sound.isBgmEnabled = !sound.isBgmEnabled;
            if (sound.isBgmEnabled) {
                btnBgm.innerText = '켜짐 🔊';
                btnBgm.classList.remove('bg-slate-100', 'text-slate-500');
                btnBgm.classList.add('bg-pink-300', 'text-white');
                sound.startBgm();
            } else {
                btnBgm.innerText = '끄기 🔇';
                btnBgm.classList.add('bg-slate-100', 'text-slate-500');
                btnBgm.classList.remove('bg-pink-300', 'text-white');
                sound.stopBgm();
            }
        });

        btnSfx.addEventListener('click', () => {
            sound.isSfxEnabled = !sound.isSfxEnabled;
            if (sound.isSfxEnabled) {
                btnSfx.innerText = '켜짐 🔊';
                btnSfx.classList.remove('bg-slate-100', 'text-slate-500');
                btnSfx.classList.add('bg-[#90CDF4]', 'text-white');
            } else {
                btnSfx.innerText = '끄기 🔇';
                btnSfx.classList.add('bg-slate-100', 'text-slate-500');
                btnSfx.classList.remove('bg-[#90CDF4]', 'text-white');
            }
        });

        // 초기 렌더링
        game.draw();
        game.drawPreviewPanels();

    </script>
</body>
